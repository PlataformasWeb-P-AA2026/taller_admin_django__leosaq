services:
  postgres:
    image: postgres:16
    container_name: postgres_patrimonio
    environment:
      POSTGRES_DB: mi_basedatos
      POSTGRES_USER: mi_usuario
      POSTGRES_PASSWORD: mi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_patrimonio
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: